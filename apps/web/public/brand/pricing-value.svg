<svg width="900" height="620" viewBox="0 0 900 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0"/>
    </pattern>
    <filter id="shadow-lg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-xl" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFC"/>
  
  <!-- Main Container Card -->
  <rect x="80" y="70" width="740" height="480" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-lg)"/>
  <rect x="80" y="70" width="740" height="480" rx="20" fill="url(#dot-grid)"/>

  <!-- Base Tier (Left) -->
  <rect x="140" y="160" width="190" height="280" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="164" y="190" width="60" height="8" rx="4" fill="#64748B"/>
  <rect x="164" y="210" width="80" height="16" rx="6" fill="#0F172A"/>
  <path d="M 164 250 L 306 250" stroke="#F1F5F9" stroke-width="2"/>
  <circle cx="170" cy="280" r="4" fill="#CBD5E1"/>
  <rect x="186" y="276" width="100" height="8" rx="4" fill="#94A3B8"/>
  <circle cx="170" cy="304" r="4" fill="#CBD5E1"/>
  <rect x="186" y="300" width="80" height="8" rx="4" fill="#94A3B8"/>
  <circle cx="170" cy="328" r="4" fill="#CBD5E1"/>
  <rect x="186" y="324" width="110" height="8" rx="4" fill="#94A3B8"/>

  <!-- Premium Dark Tier (Center) -->
  <rect x="355" y="130" width="190" height="340" rx="16" fill="#0F172A" stroke="#1E293B" stroke-width="1.5" filter="url(#shadow-xl)"/>
  <rect x="379" y="160" width="70" height="8" rx="4" fill="#818CF8"/>
  <rect x="379" y="180" width="90" height="16" rx="6" fill="#FFFFFF"/>
  <path d="M 379 220 L 521 220" stroke="#1E293B" stroke-width="2"/>
  <circle cx="385" cy="250" r="4" fill="#4F46E5"/>
  <rect x="401" y="246" width="110" height="8" rx="4" fill="#CBD5E1"/>
  <circle cx="385" cy="274" r="4" fill="#4F46E5"/>
  <rect x="401" y="270" width="90" height="8" rx="4" fill="#CBD5E1"/>
  <circle cx="385" cy="298" r="4" fill="#4F46E5"/>
  <rect x="401" y="294" width="120" height="8" rx="4" fill="#CBD5E1"/>
  <circle cx="385" cy="322" r="4" fill="#4F46E5"/>
  <rect x="401" y="318" width="80" height="8" rx="4" fill="#CBD5E1"/>
  <rect x="379" y="390" width="142" height="36" rx="8" fill="#4F46E5"/>

  <!-- Enterprise Tier (Right) -->
  <rect x="570" y="160" width="190" height="280" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="594" y="190" width="70" height="8" rx="4" fill="#64748B"/>
  <rect x="594" y="210" width="90" height="16" rx="6" fill="#0F172A"/>
  <path d="M 594 250 L 736 250" stroke="#F1F5F9" stroke-width="2"/>
  <circle cx="600" cy="280" r="4" fill="#CBD5E1"/>
  <rect x="616" y="276" width="110" height="8" rx="4" fill="#94A3B8"/>
  <circle cx="600" cy="304" r="4" fill="#CBD5E1"/>
  <rect x="616" y="300" width="90" height="8" rx="4" fill="#94A3B8"/>
  <circle cx="600" cy="328" r="4" fill="#CBD5E1"/>
  <rect x="616" y="324" width="100" height="8" rx="4" fill="#94A3B8"/>
</svg>

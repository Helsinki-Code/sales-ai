<svg width="900" height="620" viewBox="0 0 900 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0"/>
    </pattern>
    <filter id="shadow-lg" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFC"/>
  
  <!-- Main Container Card -->
  <rect x="80" y="70" width="740" height="480" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-lg)"/>
  <rect x="80" y="70" width="740" height="480" rx="20" fill="url(#dot-grid)"/>

  <!-- Path Connections -->
  <path d="M 260 310 L 360 310" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Routing Curves -->
  <path d="M 460 310 C 520 310, 520 200, 580 200" stroke="#CBD5E1" stroke-width="2" fill="none"/>
  <path d="M 460 310 L 580 310" stroke="#CBD5E1" stroke-width="2"/>
  <path d="M 460 310 C 520 310, 520 420, 580 420" stroke="#CBD5E1" stroke-width="2" fill="none"/>

  <!-- Data Packets -->
  <circle cx="310" cy="310" r="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <circle cx="310" cy="310" r="4" fill="#4F46E5"/>

  <circle cx="520" cy="255" r="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <circle cx="520" cy="255" r="4" fill="#4F46E5"/>

  <!-- Client Node (Left) -->
  <rect x="140" y="260" width="120" height="100" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <rect x="160" y="280" width="32" height="32" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="160" y="330" width="60" height="8" rx="4" fill="#0F172A"/>

  <!-- API Gateway Node (Center) -->
  <rect x="360" y="210" width="100" height="200" rx="16" fill="#0F172A" filter="url(#shadow-sm)"/>
  <rect x="380" y="230" width="60" height="6" rx="3" fill="#334155"/>
  <rect x="380" y="250" width="40" height="6" rx="3" fill="#818CF8"/>
  <rect x="380" y="270" width="50" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="380" y="310" width="60" height="6" rx="3" fill="#334155"/>
  <rect x="380" y="330" width="45" height="6" rx="3" fill="#818CF8"/>
  <rect x="380" y="350" width="55" height="6" rx="3" fill="#E2E8F0"/>

  <!-- Endpoints Nodes (Right) -->
  <!-- Endpoint 1 -->
  <rect x="580" y="170" width="160" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <circle cx="604" cy="200" r="6" fill="#10B981"/>
  <rect x="624" y="196" width="80" height="8" rx="4" fill="#0F172A"/>

  <!-- Endpoint 2 -->
  <rect x="580" y="280" width="160" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <circle cx="604" cy="310" r="6" fill="#3B82F6"/>
  <rect x="624" y="306" width="60" height="8" rx="4" fill="#0F172A"/>

  <!-- Endpoint 3 -->
  <rect x="580" y="390" width="160" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <circle cx="604" cy="420" r="6" fill="#F59E0B"/>
  <rect x="624" y="416" width="90" height="8" rx="4" fill="#0F172A"/>
</svg>
